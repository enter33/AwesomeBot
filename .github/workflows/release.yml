name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            output_name: awesome-bot.exe
            artifact_name: awesome-bot-windows-x64.zip
            package_cmd: Compress-Archive -Path awesome-bot.exe -DestinationPath dist/awesome-bot-windows-x64.zip
          - os: ubuntu-latest
            output_name: awesome-bot
            artifact_name: awesome-bot-linux-x64.tar.gz
            package_cmd: tar -czf dist/awesome-bot-linux-x64.tar.gz awesome-bot
          - os: macos-latest
            output_name: awesome-bot
            artifact_name: awesome-bot-darwin-x64.tar.gz
            package_cmd: tar -czf dist/awesome-bot-darwin-x64.tar.gz awesome-bot

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: go build -ldflags="-s -w" -o ${{ matrix.output_name }} ./cmd/awesome/

      - name: Package
        run: |
          mkdir -p dist
          ${{ matrix.package_cmd }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.AWESOME_TOKEN }}

  npm-publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@enter33'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update package.json version
        run: |
          npm pkg set version=${{ steps.version.outputs.VERSION }}

      - name: Publish to GitHub Packages
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.AWESOME_TOKEN }}
